name: Test & Deploy

# 双版本并行期：新版（Worker + 后台）从 feat/admin-backend 部署，旧版仍走 main 的
# 原有渠道；时机成熟合并后删掉 feat/admin-backend 触发即可
on:
  push:
    branches: [main, feat/admin-backend]
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      # PR：上传预览版本（预览 URL 见本步骤日志；需在 Cloudflare Dashboard
      # 开启该 Worker 的 Preview URLs 开关）
      - name: Upload preview version (PR)
        if: github.event_name == 'pull_request'
        continue-on-error: true # secrets 未配置时不阻塞 CI（测试与构建仍是硬门槛）
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload

      # 部署分支：部署生产（并行期为 feat/admin-backend；合并后为 main）
      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/admin-backend')
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
