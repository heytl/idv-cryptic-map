<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加页手记 | 侧门入口解密攻略手册</title>
  
  <!-- 引入复古哥特风格字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 提灯光晕背景 -->
  <div class="glow-bg"></div>

  <div class="app-container">
    <!-- 头部栏 -->
    <header class="app-header">
      <div class="header-decoration left-deco"></div>
      <h1 class="app-title"><span class="en-font">CRYPTIC HANDBOOK</span><br>加页手记解密手册</h1>
      <div class="header-decoration right-deco"></div>
    </header>

    <!-- 视图一：手记目录页 (Catalog View) -->
    <main id="catalog-view" class="view-panel active">
      <div class="parchment-card">
        <div class="card-inner">
          <div class="corner-decor top-left"></div>
          <div class="corner-decor top-right"></div>
          <div class="corner-decor bottom-left"></div>
          <div class="corner-decor bottom-right"></div>

          <div class="catalog-intro">
            <p class="handwriting">庄园的侧门千变万化，寻找密码是唯一的生路。请根据您当前所处侧门入口的墙体结构，确认本局所在的地图...</p>
          </div>

          <!-- 方向过滤器 -->
          <div class="tabs-container">
            <div class="tabs-label">侧门入口方向过滤:</div>
            <div class="tabs">
              <button class="tab-btn active" data-filter="all">
                <span class="btn-texture"></span>全部
              </button>
              <button class="tab-btn" data-filter="左">
                <span class="btn-texture"></span>左
              </button>
              <button class="tab-btn" data-filter="右">
                <span class="btn-texture"></span>右
              </button>
              <button class="tab-btn" data-filter="南">
                <span class="btn-texture"></span>南
              </button>
              <button class="tab-btn" data-filter="北">
                <span class="btn-texture"></span>北
              </button>
            </div>
            <!-- 卡片密度切换器 (标准/紧凑, 复用楼层切换的滑块设计语言) -->
            <div class="density-switch" id="density-switch" role="group" aria-label="卡片密度切换">
              <button class="density-opt active" data-density="comfort" title="标准视图" aria-pressed="true">
                <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
                  <rect x="1" y="1" width="6" height="6" rx="1"/>
                  <rect x="9" y="1" width="6" height="6" rx="1"/>
                  <rect x="1" y="9" width="6" height="6" rx="1"/>
                  <rect x="9" y="9" width="6" height="6" rx="1"/>
                </svg>
              </button>
              <button class="density-opt" data-density="compact" title="紧凑视图：一行显示更多卡片" aria-pressed="false">
                <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
                  <rect x="1" y="1" width="4" height="4" rx="0.5"/>
                  <rect x="6" y="1" width="4" height="4" rx="0.5"/>
                  <rect x="11" y="1" width="4" height="4" rx="0.5"/>
                  <rect x="1" y="6" width="4" height="4" rx="0.5"/>
                  <rect x="6" y="6" width="4" height="4" rx="0.5"/>
                  <rect x="11" y="6" width="4" height="4" rx="0.5"/>
                  <rect x="1" y="11" width="4" height="4" rx="0.5"/>
                  <rect x="6" y="11" width="4" height="4" rx="0.5"/>
                  <rect x="11" y="11" width="4" height="4" rx="0.5"/>
                </svg>
              </button>
              <div class="density-slider"></div>
            </div>
          </div>

          <!-- 入口图网格 -->
          <div id="entry-grid" class="entry-grid">
            <!-- 动态生成卡片 -->
          </div>
        </div>
      </div>
    </main>

    <!-- 视图二：地图详情页 (Strategy View) -->
    <main id="strategy-view" class="view-panel">
      <!-- 顶部控制条 -->
      <div class="control-bar">
        <button id="back-btn" class="gothic-btn btn-back">
          <span class="btn-texture"></span> 返回手记目录
        </button>
        
        <div class="map-title-container">
          <h2 id="current-map-name" class="map-title">地图名称</h2>
          <span id="current-map-direction" class="map-direction-badge">方向</span>
        </div>

        <!-- 一楼二楼切换器 (复古手感拉杆拉动样式) -->
        <div class="floor-toggle-wrapper">
          <span class="toggle-label">楼层切换:</span>
          <div class="floor-switch" id="floor-switch">
            <div class="switch-btn active" data-floor="full">全图</div>
            <div class="switch-btn" data-floor="1">1楼</div>
            <div class="switch-btn" data-floor="2">2楼</div>
            <div class="switch-slider"></div>
          </div>
        </div>
      </div>

      <div class="detail-container">
        <!-- 左侧/参考面板: 侧门结构 -->
        <section class="info-sidebar">
          <div class="parchment-card tight">
            <div class="card-inner">
              <h3 class="sidebar-title">侧门入口参考</h3>
              <div class="entry-img-container">
                <img id="ref-entry-img" src="" alt="侧门入口图">
                <div class="scan-line"></div>
              </div>
              <div class="sidebar-info-box">
                <div class="info-item">
                  <span class="label">入口方向:</span>
                  <span id="info-direction" class="value">未知</span>
                </div>
                <div class="info-item">
                  <span class="label">特征备注:</span>
                  <span id="info-remarks" class="value handwriting">未知</span>
                </div>
              </div>
              <div class="legend-box">
                <h4 class="legend-title">图示说明</h4>
                <div class="legend-grid">
                  <div class="legend-item">
                    <span class="legend-label">主要路线</span>
                    <span class="legend-line red"></span>
                  </div>
                  <div class="legend-item">
                    <span class="legend-label">次要路线</span>
                    <span class="legend-line blue"></span>
                  </div>
                  <div class="legend-item">
                    <span class="legend-label">金箱点</span>
                    <span class="legend-symbol gold-chest"><img src="public/icons/treasure.webp" alt="金箱"></span>
                  </div>
                  <div class="legend-item">
                    <span class="legend-label">上/下层移动</span>
                    <span class="legend-arrow">⇅</span>
                  </div>
                  <div class="legend-item">
                    <span class="legend-label">起点</span>
                    <span class="legend-shape green-triangle">▲</span>
                  </div>
                  <div class="legend-item">
                    <span class="legend-label">终点</span>
                    <span class="legend-shape green-circle">●</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- 右侧：地图交互面板 -->
        <section class="map-main-panel">
          <div class="parchment-card tight map-card">
            <div class="card-inner">
              <!-- 地图视口 -->
              <div class="map-viewport" id="map-viewport">
                <!-- 全屏关闭按钮 -->
                <button class="fullscreen-close-btn" title="退出全屏">&times;</button>
                <div class="map-wrapper" id="map-wrapper">
                  <img id="main-map-img" src="" alt="交互地图" draggable="false">
                  <!-- 高亮覆盖层 -->
                  <div id="highlight-overlay" class="highlight-overlay"></div>
                </div>
                <!-- 遮罩图层，制造神秘感 -->
                <div class="vignette-overlay"></div>
              </div>

              <!-- 地图浮动工具栏 -->
              <div class="map-floating-controls">
                <button class="tool-btn zoom-in-btn" title="放大"><span class="icon">+</span></button>
                <button class="tool-btn zoom-out-btn" title="缩小"><span class="icon">-</span></button>
                <button class="tool-btn fullscreen-btn" title="地图全屏"><span class="icon">⤢</span></button>
                <button class="tool-btn reset-btn" title="重置自适应"><span class="icon">⟲</span></button>
              </div>

              <!-- 房间/区域导航 -->
              <div class="room-selector-panel" style="display: none;">
                <span class="room-nav-title">快速区域指引:</span>
                <div id="room-buttons" class="room-buttons">
                  <!-- 动态生成房间高亮按钮 -->
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- 页脚 -->
    <footer class="app-footer">
      <p>© 2026 OUU 第五人格“加页手记”解密手册 | 地图数据源自<a href="https://space.bilibili.com/8618005" target="_blank" class="author-link">凉哈皮</a> </p>
      <p class="footer-meta">
        <span class="update-time">地图数据更新于 2026-07-02</span>
        <span class="footer-divider">·</span>
        <a href="https://github.com/heytl/idv-cryptic-map" target="_blank" class="author-link github-link">
          <svg class="github-icon" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub 开源
        </a>
        <span class="footer-divider">·</span>
        <span class="footer-slogan">本项目开源免费，欢迎 Star 与反馈</span>
      </p>
    </footer>
  </div>

  <script src="script.js"></script>
  <!-- Vercel Web Analytics 访问统计（仅在 Vercel 部署时生效，本地/GitHub Pages 下静默失败无副作用） -->
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
